# docker-compose.db-dev.yml â€” DEV Environment
# Project : SaaS Blueprint V1
# Variant : regular (postgres vanilla)
# Generated by gus-factory / create_project.py
# â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
# Copied to the project root by scripts/switch_postgres_variant.py.
# To switch variants: `python scripts/switch_postgres_variant.py regular`

name: gus-blueprint-dev

services:

  # â”€â”€ PostgreSQL DEV â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  postgres-dev:
    image: postgres:18
    container_name: blueprint-postgres-dev
    command: >
      postgres
      --hba-file=/etc/saas-blueprint-config/pg_hba.conf
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=128
      -c hot_standby=on
    environment:
      POSTGRES_DB:       blueprint_dev
      POSTGRES_USER:     blueprint
      POSTGRES_PASSWORD: blueprint
      PGDATA:            /var/lib/postgresql/data
      TZ:                America/Sao_Paulo
      PGTZ:              America/Sao_Paulo
    ports:
      - "5446:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./infra/postgres/primary:/docker-entrypoint-initdb.d
      - ./infra/postgres/primary/postgresql.conf:/etc/saas-blueprint-config/postgresql.conf:ro
      - ./infra/postgres/primary/pg_hba.conf:/etc/saas-blueprint-config/pg_hba.conf:ro
    networks:
      - saas-blueprint-v1-network-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprint -d blueprint_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # @IF replica
  # â”€â”€ PostgreSQL DEV Replica (DB_ENABLE_REPLICA=true) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  postgres-dev-replica:
    image: postgres:18
    container_name: blueprint-postgres-replica-dev
    entrypoint: ["/replica/entrypoint.sh"]
    environment:
      POSTGRES_DB:       blueprint_dev
      POSTGRES_USER:     blueprint
      POSTGRES_PASSWORD: blueprint
      PGDATA:                        /var/lib/postgresql/data
      POSTGRES_PRIMARY_HOST:         postgres-dev
      POSTGRES_PRIMARY_PORT:         5432
      POSTGRES_REPLICATION_USER:     replicator
      POSTGRES_REPLICATION_PASSWORD: replicator_password
      TZ:                            America/Sao_Paulo
      PGTZ:                          America/Sao_Paulo
    ports:
      - "5447:5432"
    volumes:
      - postgres_data_dev_replica:/var/lib/postgresql/data
      - ./infra/postgres/replica/entrypoint.sh:/replica/entrypoint.sh
    networks:
      - saas-blueprint-v1-network-dev
    restart: unless-stopped
    depends_on:
      postgres-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprint -d blueprint_dev"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
  # @ENDIF replica

  # @IF redis
  # â”€â”€ Redis DEV (included if CACHE_LAYER=Redis) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  redis-dev:
    image: redis:7-alpine
    container_name: blueprint-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "6383:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - saas-blueprint-v1-network-dev
    restart: unless-stopped
  # @ENDIF redis

  # @IF etl
  # â”€â”€ RabbitMQ DEV (included if QUEUE_LAYER=RabbitMQ) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  rabbitmq-dev:
    image: rabbitmq:3-management-alpine
    container_name: blueprint-rabbitmq-dev
    ports:
      - "5674:5672"
      - "15674:15672"
    environment:
      RABBITMQ_DEFAULT_USER: blueprint
      RABBITMQ_DEFAULT_PASS: blueprint
      RABBITMQ_DEFAULT_VHOST: blueprint_etl_dev
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    networks:
      - saas-blueprint-v1-network-dev
    restart: unless-stopped
  # @ENDIF etl

  # @IF qdrant
  # â”€â”€ Qdrant DEV (included if EMBEDDING_DB=Qdrant) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  qdrant-dev:
    image: qdrant/qdrant:latest
    container_name: blueprint-qdrant-dev
    ports:
      - "6341:6333"
      - "6342:6334"
    volumes:
      - qdrant_data_dev:/qdrant/storage
    networks:
      - saas-blueprint-v1-network-dev
    restart: unless-stopped
  # @ENDIF qdrant

volumes:
  postgres_data_dev:
    name: blueprint_postgres_data_dev
  # @IF replica
  postgres_data_dev_replica:
    name: blueprint_postgres_data_dev_replica
  # @ENDIF replica
  # @IF redis
  redis_data_dev:
    name: blueprint_redis_data_dev
  # @ENDIF redis
  # @IF etl
  rabbitmq_data_dev:
    name: blueprint_rabbitmq_data_dev
  # @ENDIF etl
  # @IF qdrant
  qdrant_data_dev:
    name: blueprint_qdrant_data_dev
  # @ENDIF qdrant

networks:
  saas-blueprint-v1-network-dev:
    driver: bridge
    name: gus-blueprint-network-dev

