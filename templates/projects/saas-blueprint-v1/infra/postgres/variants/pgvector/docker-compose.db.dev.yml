# docker-compose.db-dev.yml — DEV Environment
# Project : SaaS Blueprint V1
# Variant : pgvector (postgres 18 + vector extension, replaces Qdrant)
# Generated by gus-factory / create_project.py
# ──────────────────────────────────────────────────────────────────
# Copied to the project root by scripts/switch_postgres_variant.py.
# To switch variants: `python scripts/switch_postgres_variant.py pgvector`

name: gus-factory-saas-blueprint-v1-dev

services:

  # ── PostgreSQL DEV ─────────────────────────────────────────────
  postgres-dev:
    image: pgvector/pgvector:pg18-trixie
    container_name: saas-blueprint-v1-postgres-dev
    command: >
      postgres
      --hba-file=/etc/saas-blueprint-config/pg_hba.conf
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=128
      -c hot_standby=on
    environment:
      POSTGRES_DB:       saas_blueprint_v1_dev
      POSTGRES_USER:     saas_blueprint_v1
      POSTGRES_PASSWORD: saas_blueprint_v1
      PGDATA:            /var/lib/postgresql/data
      TZ:                America/Sao_Paulo
      PGTZ:              America/Sao_Paulo
    ports:
      - "5446:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./infra/postgres/primary:/docker-entrypoint-initdb.d
      - ./infra/postgres/primary/postgresql.conf:/etc/saas-blueprint-config/postgresql.conf:ro
      - ./infra/postgres/primary/pg_hba.conf:/etc/saas-blueprint-config/pg_hba.conf:ro
    networks:
      - saas-blueprint-v1-network-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_blueprint_v1 -d saas_blueprint_v1_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # @IF replica
  # ── PostgreSQL DEV Replica (DB_ENABLE_REPLICA=true) ────────────
  postgres-dev-replica:
    image: pgvector/pgvector:pg18-trixie
    container_name: saas-blueprint-v1-postgres-dev-replica
    entrypoint: ["/replica/entrypoint.sh"]
    environment:
      POSTGRES_DB:       saas_blueprint_v1_dev
      POSTGRES_USER:     saas_blueprint_v1
      POSTGRES_PASSWORD: saas_blueprint_v1
      PGDATA:                        /var/lib/postgresql/data
      POSTGRES_PRIMARY_HOST:         postgres-dev
      POSTGRES_PRIMARY_PORT:         5432
      POSTGRES_REPLICATION_USER:     replicator
      POSTGRES_REPLICATION_PASSWORD: replicator_password
      TZ:                            America/Sao_Paulo
      PGTZ:                          America/Sao_Paulo
    ports:
      - "5447:5432"
    volumes:
      - postgres_data_dev_replica:/var/lib/postgresql/data
      - ./infra/postgres/replica/entrypoint.sh:/replica/entrypoint.sh
    networks:
      - saas-blueprint-v1-network-dev
    restart: unless-stopped
    depends_on:
      postgres-dev:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_blueprint_v1 -d saas_blueprint_v1_dev"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
  # @ENDIF replica

  # @IF redis
  # ── Redis DEV (included if CACHE_LAYER=Redis) ──────────────────
  redis-dev:
    image: redis:7-alpine
    container_name: saas-blueprint-v1-redis-dev
    command: redis-server --appendonly yes
    ports:
      - "6383:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - saas-blueprint-v1-network-dev
    restart: unless-stopped
  # @ENDIF redis

  # @IF etl
  # ── RabbitMQ DEV (included if QUEUE_LAYER=RabbitMQ) ───────────
  rabbitmq-dev:
    image: rabbitmq:3-management-alpine
    container_name: saas-blueprint-v1-rabbitmq-dev
    ports:
      - "5674:5672"
      - "15674:15672"
    volumes:
      - rabbitmq_data_dev:/var/lib/rabbitmq
    networks:
      - saas-blueprint-v1-network-dev
    restart: unless-stopped
  # @ENDIF etl

  # @IF qdrant
  # ── Qdrant DEV (included if EMBEDDING_DB=Qdrant) ──────────────
  qdrant-dev:
    image: qdrant/qdrant:latest
    container_name: saas-blueprint-v1-qdrant-dev
    ports:
      - "6341:6333"
      - "6342:6334"
    volumes:
      - qdrant_data_dev:/qdrant/storage
    networks:
      - saas-blueprint-v1-network-dev
    restart: unless-stopped
  # @ENDIF qdrant

volumes:
  postgres_data_dev:
    name: saas_blueprint_v1_postgres_data_dev
  # @IF replica
  postgres_data_dev_replica:
    name: saas_blueprint_v1_postgres_data_dev_replica
  # @ENDIF replica
  # @IF redis
  redis_data_dev:
    name: saas_blueprint_v1_redis_data_dev
  # @ENDIF redis
  # @IF etl
  rabbitmq_data_dev:
    name: saas_blueprint_v1_rabbitmq_data_dev
  # @ENDIF etl
  # @IF qdrant
  qdrant_data_dev:
    name: saas_blueprint_v1_qdrant_data_dev
  # @ENDIF qdrant

networks:
  saas-blueprint-v1-network-dev:
    driver: bridge
    name: saas-blueprint-v1-network-dev
