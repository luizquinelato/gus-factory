# docker-compose.db.yml — PROD Environment
# Project : SaaS Blueprint V1
# Variant : regular (postgres vanilla)
# Generated by gus-factory / create_project.py
# ──────────────────────────────────────────────────────────────────
# Copied to the project root by scripts/switch_postgres_variant.py.
# To switch variants: `python scripts/switch_postgres_variant.py regular`

name: gus-blueprint

services:

  # ── PostgreSQL PROD ─────────────────────────────────────────────
  postgres:
    image: postgres:18
    container_name: blueprint-postgres
    command: >
      postgres
      --hba-file=/etc/saas-blueprint-config/pg_hba.conf
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=128
      -c hot_standby=on
    environment:
      POSTGRES_DB:       blueprint
      POSTGRES_USER:     blueprint
      POSTGRES_PASSWORD: blueprint
      PGDATA:            /var/lib/postgresql/data
      TZ:                America/Sao_Paulo
      PGTZ:              America/Sao_Paulo
    ports:
      - "5444:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./infra/postgres/primary:/docker-entrypoint-initdb.d
      - ./infra/postgres/primary/postgresql.conf:/etc/saas-blueprint-config/postgresql.conf:ro
      - ./infra/postgres/primary/pg_hba.conf:/etc/saas-blueprint-config/pg_hba.conf:ro
    networks:
      - saas-blueprint-v1-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprint -d blueprint"]
      interval: 10s
      timeout: 5s
      retries: 5

  # @IF replica
  # ── PostgreSQL PROD Replica (DB_ENABLE_REPLICA=true) ───────────
  postgres-replica:
    image: postgres:18
    container_name: blueprint-postgres-replica
    entrypoint: ["/replica/entrypoint.sh"]
    environment:
      POSTGRES_DB:       blueprint
      POSTGRES_USER:     blueprint
      POSTGRES_PASSWORD: blueprint
      PGDATA:                        /var/lib/postgresql/data
      POSTGRES_PRIMARY_HOST:         postgres
      POSTGRES_PRIMARY_PORT:         5432
      POSTGRES_REPLICATION_USER:     replicator
      POSTGRES_REPLICATION_PASSWORD: replicator_password
      TZ:                            America/Sao_Paulo
      PGTZ:                          America/Sao_Paulo
    ports:
      - "5445:5432"
    volumes:
      - postgres_data_prod_replica:/var/lib/postgresql/data
      - ./infra/postgres/replica/entrypoint.sh:/replica/entrypoint.sh
    networks:
      - saas-blueprint-v1-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blueprint -d blueprint"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
  # @ENDIF replica

  # @IF redis
  # ── Redis PROD (included if CACHE_LAYER=Redis) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: blueprint-redis
    command: redis-server --appendonly yes
    ports:
      - "6385:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - saas-blueprint-v1-network
    restart: unless-stopped
  # @ENDIF redis

  # @IF etl
  # ── RabbitMQ PROD (included if QUEUE_LAYER=RabbitMQ) ───────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: blueprint-rabbitmq
    ports:
      - "5675:5672"
      - "15675:15672"
    environment:
      RABBITMQ_DEFAULT_USER: blueprint
      RABBITMQ_DEFAULT_PASS: blueprint
      RABBITMQ_DEFAULT_VHOST: blueprint_etl
    volumes:
      - rabbitmq_data_prod:/var/lib/rabbitmq
    networks:
      - saas-blueprint-v1-network
    restart: unless-stopped
  # @ENDIF etl

  # @IF qdrant
  # ── Qdrant PROD (included if EMBEDDING_DB=Qdrant) ──────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: blueprint-qdrant
    ports:
      - "6343:6333"
      - "6344:6334"
    volumes:
      - qdrant_data_prod:/qdrant/storage
    networks:
      - saas-blueprint-v1-network
    restart: unless-stopped
  # @ENDIF qdrant

volumes:
  postgres_data_prod:
    name: blueprint_postgres_data_prod
  # @IF replica
  postgres_data_prod_replica:
    name: blueprint_postgres_data_prod_replica
  # @ENDIF replica
  # @IF redis
  redis_data_prod:
    name: blueprint_redis_data_prod
  # @ENDIF redis
  # @IF etl
  rabbitmq_data_prod:
    name: blueprint_rabbitmq_data_prod
  # @ENDIF etl
  # @IF qdrant
  qdrant_data_prod:
    name: blueprint_qdrant_data_prod
  # @ENDIF qdrant

networks:
  saas-blueprint-v1-network:
    driver: bridge
    name: gus-blueprint-network

