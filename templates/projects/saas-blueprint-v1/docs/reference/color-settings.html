<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cores — Referência Visual e Funções de Cálculo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;height:100vh;background:#f1f5f9;color:#111827}
aside{width:200px;background:#1e293b;color:#f1f5f9;padding:1.25rem 1rem;flex-shrink:0}
.brand{padding:.75rem;background:linear-gradient(135deg,#297BFF,#0CC02A);border-radius:8px;font-weight:700;margin-bottom:1rem;text-align:center;font-size:.9rem}
.nav{padding:.6rem .75rem;border-radius:6px;color:#94a3b8;font-size:.85rem;cursor:pointer;margin-bottom:.2rem}
.nav.active{background:rgba(255,255,255,.1);color:#f1f5f9}
main{flex:1;overflow-y:auto;padding:2rem;display:flex;flex-direction:column;gap:1.25rem}
h1{font-size:1.4rem;font-weight:700}.sub{color:#6b7280;font-size:.875rem}
/* Action bar */
.action-bar{display:flex;justify-content:flex-end;gap:.625rem}
.btn-r{padding:.45rem 1rem;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#374151;font-size:.8rem;cursor:pointer}
.btn-s{padding:.45rem 1rem;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer}
.btn-r:disabled,.btn-s:disabled{opacity:.45;cursor:not-allowed}
/* Section card */
.sc{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.25rem}
.sc-title{font-weight:700;font-size:.95rem;margin-bottom:.25rem}
.sc-sub{color:#6b7280;font-size:.78rem;margin-bottom:1rem}
/* Mode radio cards */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.mc{border-radius:10px;padding:1rem 1.25rem;border:2px solid #e2e8f0;cursor:pointer;display:flex;align-items:center;gap:.75rem;transition:all .2s}
.mc.sel{border-color:transparent;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.mc input[type=radio]{accent-color:#fff;flex-shrink:0}
.mc .mt{font-weight:600;font-size:.875rem}.mc .md{font-size:.75rem;opacity:.75}
/* Two-column layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
/* Theme panels */
.tp{border-radius:10px;padding:1rem;border:1px solid}
.tp.light{background:#fff;border-color:#e2e8f0}
.tp.dark{background:#111827;border-color:#374151}
.tp-title{font-weight:600;font-size:.85rem;margin-bottom:1rem;display:flex;align-items:center;gap:.4rem}
.tp.dark .tp-title{color:#f9fafb}
/* 5-column color grid */
.cgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:.625rem}
.ci{display:flex;flex-direction:column;align-items:center;gap:.35rem;text-align:center}
.sw{width:64px;height:64px;border-radius:8px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.15);overflow:hidden}
.sw:not(.lk){cursor:pointer;transition:transform .15s}
.sw:not(.lk):hover{transform:scale(1.07)}
.sw.lk{cursor:not-allowed;opacity:.65}
.sw input[type=color]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:inherit}
.cl{font-size:.65rem;font-weight:600;color:#374151}.tp.dark .cl{color:#d1d5db}
.hx{width:60px;padding:.2rem .3rem;border:1px solid #d1d5db;border-radius:5px;font-family:monospace;font-size:.62rem;text-align:center;background:#fff}
.tp.dark .hx{background:#374151;border-color:#4b5563;color:#f9fafb}
.hx:disabled{opacity:.5;cursor:not-allowed}
/* Variant rows */
.vr-label{font-size:.7rem;font-weight:600;color:#6b7280;margin:.75rem 0 .4rem}
.tp.dark .vr-label{color:#9ca3af}
.aa-sw{width:48px;height:48px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.vr-hex{font-size:.6rem;font-family:monospace;color:#6b7280;text-align:center;margin-top:.15rem}
.tp.dark .vr-hex{color:#9ca3af}
</style>
</head>
<body>
<aside>
  <div class="brand">{{ PROJECT_NAME }}</div>
  <div class="nav">🏠 Home</div><div class="nav">📊 Dashboard</div>
  <div class="nav active">🎨 Cores</div><div class="nav">⚙️ Config</div>
</aside>
<main>
  <div><h1>🎨 Color Scheme Settings</h1>
    <p class="sub">Customize your platform's color palette and theme preferences.</p></div>
  <div class="action-bar">
    <button class="btn-r" id="btnReset" disabled>Reset</button>
    <button class="btn-s" id="btnSave" disabled>Save Changes</button>
  </div>
  <!-- 1. Mode selection: radio cards com cor dinâmica (Pulse pattern) -->
  <div class="sc"><p class="sc-title">Schema Mode</p>
    <div class="mode-grid" id="modeGrid"></div></div>
  <!-- 2. Color editing: Light + Dark side by side -->
  <div class="sc"><p class="sc-title" id="editTitle">Colors (Read-Only)</p>
    <p class="sc-sub" id="editSub">Switch to Custom mode to edit colors</p>
    <div class="two-col" id="editGrid"></div></div>
  <!-- 3. Variant sections: Regular / AA / AAA (filled by JS) -->
  <div id="varSections"></div>
  <p style="text-align:center;color:#9ca3af;font-size:.72rem;padding-bottom:2rem">
    Referência visual — implementar em React/TSX copiando a lógica JS acima</p>
</main>
<script>
// ═══ FUNÇÕES DE CÁLCULO — traduzir 1:1 para TypeScript e Python ═══════════
// Ref: gus-pulse color_calculation_service.py + ColorSchemaPanel.tsx

// ── Cálculo de luminância WCAG 2.1 ─────────────────────────────────────────
function lum(hex){const[r,g,b]=[1,3,5].map(i=>parseInt(hex.slice(i,i+2),16)/255);const f=c=>c<=0.03928?c/12.92:((c+0.055)/1.055)**2.4;return 0.2126*f(r)+0.7152*f(g)+0.0722*f(b)}

// pick_on_color — threshold configurável via system_settings.font_contrast_threshold (default=0.5)
function onC(hex,t=0.5){return lum(hex)<t?'#FFFFFF':'#000000'}

// pick_gradient_on_color — Pulse: se on(a)===on(b) retorna esse; senão usa média de luminância
function gradC(a,b,t=0.5){const oa=onC(a,t),ob=onC(b,t);if(oa===ob)return oa;return(lum(a)+lum(b))/2<t?'#FFFFFF':'#000000'}

// darken — usada para variantes AA (5%) e AAA (10%)
function drk(hex,f){const[r,g,b]=[1,3,5].map(i=>Math.max(0,Math.round(parseInt(hex.slice(i,i+2),16)*(1-f))));return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase()}

// applyLevel — regular=original | AA=darken 5% | AAA=darken 10%
function applyLvl(hex,lvl){return lvl==='AAA'?drk(hex,.1):lvl==='AA'?drk(hex,.05):hex.toUpperCase()}

// calculateVariants — on_color1..5 + on_gradient_1_2..5_1 para um set de 5 cores
function calcV(cols){const on={},gr={};for(let k=1;k<=5;k++)on[`on_color${k}`]=onC(cols[`color${k}`]);[[1,2],[2,3],[3,4],[4,5],[5,1]].forEach(([a,b])=>gr[`on_gradient_${a}_${b}`]=gradC(cols[`color${a}`],cols[`color${b}`]));return{...cols,...on,...gr}}

// buildLevel — gera um nível WCAG completo para um set base
function buildLvl(base,lvl){const e={};for(let k=1;k<=5;k++)e[`color${k}`]=applyLvl(base[`color${k}`],lvl);return{lvl,...calcV(e)}}

// ── Estado ─────────────────────────────────────────────────────────────────
// LocalStorage keys (Pulse pattern):
//   '{prefix}_complete_color_data' → 12 objetos (2 modos × 2 temas × 3 níveis)
//   '{prefix}_color_schema_mode'   → 'default' | 'custom'
// Ler cores ativas: find(c => c.color_schema_mode===mode && c.theme_mode===theme && c.accessibility_level===level)
// Aplicar: document.documentElement.style.setProperty('--color-N', row.colorN)

// Paletas exatas da migration 0002 (referência: gus-plumo)
const PALETTE={
  default:{
    light:{color1:'#297BFF',color2:'#0CC02A',color3:'#005F61',color4:'#6F74B8',color5:'#220080'},
    dark: {color1:'#297BFF',color2:'#0CC02A',color3:'#005F61',color4:'#6F74B8',color5:'#220080'},
  },
  custom:{
    light:{color1:'#E63946',color2:'#F4A261',color3:'#9D4EDD',color4:'#00B4D8',color5:'#2D3748'},
    dark: {color1:'#FF6B6B',color2:'#FFD93D',color3:'#C77DFF',color4:'#48CAE4',color5:'#4A5568'},
  }
}
const KEYS=['color1','color2','color3','color4','color5']
const PAIRS=[[1,2],[2,3],[3,4],[4,5],[5,1]]
let mode='default',hasChanges=false
let lc={...PALETTE.default.light},dc={...PALETTE.default.dark}
let dbLc={...PALETTE.custom.light},dbDc={...PALETTE.custom.dark} // custom salvo no DB

// ── Render: Mode Cards (Pulse: radio labels, background=color1 quando selecionado) ──
function renderMode(){
  const g=document.getElementById('modeGrid')
  g.innerHTML=['default','custom'].map(m=>{const sel=mode===m
    const c1=m==='default'?PALETTE.default.light.color1:dbLc.color1
    return`<label class="mc${sel?' sel':''}" style="${sel?`background:${c1};color:#fff`:'color:#374151'}">
      <input type="radio" name="m" value="${m}"${sel?' checked':''}> <div>
      <div class="mt">${m==='default'?'🔒 Default Colors':'🎨 Custom Colors'}</div>
      <div class="md">${m==='default'?'Use system default palette':'Customize your own palette'}</div></div>
    </label>`}).join('')
  g.querySelectorAll('input').forEach(i=>i.onchange=()=>setMode(i.value))
}

// ── Render: Color Edit (Pulse: 64px swatch clicável + hex input abaixo) ────
function renderEdit(){
  const locked=mode==='default'
  document.getElementById('editTitle').textContent=locked?'Colors (Read-Only)':'Customize Colors'
  document.getElementById('editSub').textContent=locked?'Switch to Custom to edit':'Click a swatch or type a hex value'
  document.getElementById('editGrid').innerHTML=['light','dark'].map(th=>{
    const cols=th==='light'?lc:dc
    return`<div class="tp ${th}"><div class="tp-title">${th==='light'?'☀️ Light Theme':'🌙 Dark Theme'}</div>
      <div class="cgrid">${KEYS.map((k,i)=>{const hex=cols[k]
        return`<div class="ci">
          <div class="sw${locked?' lk':''}" id="sw-${th}-${i}" style="background:${hex}"
               title="${locked?'Switch to Custom to edit':k}" onclick="${locked?'void 0':`document.getElementById('pk-${th}-${i}').click()`}">
            ${locked?'':`<input type="color" id="pk-${th}-${i}" value="${hex}" data-t="${th}" data-k="${k}">`}
          </div>
          <span class="cl">${k}</span>
          <input class="hx" type="text" value="${hex}" maxlength="7" data-t="${th}" data-k="${k}"${locked?' disabled':''}>
        </div>`}).join('')}</div></div>`}).join('')
  addListeners()
}

function addListeners(){
  document.querySelectorAll('input[type=color][data-k]').forEach(inp=>inp.oninput=e=>{
    const{t,k}=e.target.dataset,v=e.target.value.toUpperCase();(t==='light'?lc:dc)[k]=v
    const ci=e.target.closest('.ci');ci.querySelector('.sw').style.background=v;const hx=ci.querySelector('.hx');if(hx)hx.value=v
    changed();renderVariants()})
  document.querySelectorAll('.hx:not([disabled])').forEach(inp=>inp.oninput=e=>{
    const v=e.target.value,{t,k}=e.target.dataset;if(!/^#[0-9a-fA-F]{6}$/.test(v))return
    const vu=v.toUpperCase();(t==='light'?lc:dc)[k]=vu
    const ci=e.target.closest('.ci');ci.querySelector('.sw').style.background=vu
    const pk=ci.querySelector('input[type=color]');if(pk)pk.value=vu
    changed();renderVariants()})}

// ── Render: 3 Variant Sections (Pulse: Regular / AA / AAA, cada uma Light+Dark) ──
function renderVariants(){
  const wrap=document.getElementById('varSections')
  const META=[['regular','Calculated Color Variants — Regular','Base colors with WCAG on-colors and gradient text colors.'],
              ['AA','Calculated Color Variants — AA Accessibility','5% darkened · WCAG AA enhanced contrast (4.5:1).'],
              ['AAA','Calculated Color Variants — AAA Accessibility','10% darkened · WCAG AAA maximum contrast (7:1).']]
  wrap.innerHTML=META.map(([lvl,title,desc])=>`
    <div class="sc"><p class="sc-title">${title}</p><p class="sc-sub">${desc}</p>
    <div class="two-col">${['light','dark'].map(th=>{const v=buildLvl(th==='light'?lc:dc,lvl),base=th==='light'?lc:dc
      return`<div class="tp ${th}"><div class="tp-title">${th==='light'?'☀️ Light':'🌙 Dark'} Theme Variants</div>
        <div class="vr-label">Text Colors (On Colors)</div>
        <div class="cgrid">${[1,2,3,4,5].map(n=>`<div class="ci">
          <div class="aa-sw" style="background:${v[`color${n}`]};color:${v[`on_color${n}`]}">Aa</div>
          <div class="vr-hex">${v[`on_color${n}`]}</div></div>`).join('')}</div>
        <div class="vr-label">Gradient Text Colors</div>
        <div class="cgrid">${PAIRS.map(([a,b])=>`<div class="ci">
          <div class="aa-sw" style="background:linear-gradient(45deg,${base[`color${a}`]},${base[`color${b}`]});color:${v[`on_gradient_${a}_${b}`]}">Aa</div>
          <div class="vr-hex">${v[`on_gradient_${a}_${b}`]}</div></div>`).join('')}</div>
      </div>`}).join('')}</div></div>`).join('')
}

// ── Handlers ────────────────────────────────────────────────────────────────
function setMode(m){
  mode=m
  if(m==='default'){
    // Default: sempre mostra a paleta padrão (somente leitura)
    lc={...PALETTE.default.light};dc={...PALETTE.default.dark}
  } else {
    // Custom: carrega o que está salvo no DB (editável)
    lc={...dbLc};dc={...dbDc}
  }
  changed();render()
}
function changed(){hasChanges=true;document.getElementById('btnReset').disabled=false;document.getElementById('btnSave').disabled=false}
function render(){renderMode();renderEdit();renderVariants()}
document.getElementById('btnReset').onclick=()=>{
  // Restaura os valores do DB (sem mudar o modo atual)
  if(mode==='custom'){lc={...dbLc};dc={...dbDc}}
  else{lc={...PALETTE.default.light};dc={...PALETTE.default.dark}}
  hasChanges=false;document.getElementById('btnReset').disabled=true;document.getElementById('btnSave').disabled=true;render()}
document.getElementById('btnSave').onclick=()=>{
  if(mode==='custom'){dbLc={...lc};dbDc={...dc}} // persiste custom no "DB"
  hasChanges=false;document.getElementById('btnReset').disabled=true;document.getElementById('btnSave').disabled=true
  alert('Demo — implement:\n• POST /api/v1/admin/color-schema/unified  (cores custom)\n• POST /api/v1/admin/color-schema/mode  (modo ativo)')}

// Init
render()
</script>
</body>
</html>
