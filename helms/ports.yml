      proto: grpc
    - name: rabbitmq_mgmt_dev
      port: 15674
      proto: http
    - name: rabbitmq_amqp_dev
      port: 5674
      proto: amqp
  plumo:
    label: Plumo — Finanças leves, vida plena
    root: C:\Workspace\gus-plumo
    color: Cyan
    legacy: true
    conflicts_with: []
    prod:
      svc: {backend: 8000, auth: 8001, frontend: 5173}
      db: {port: 5432, name: plumo, user: plumo, pass: plumo}
    dev:
      svc: {backend: 8010, auth: 8011, frontend: 5174}
      db: {port: 5433, name: plumo_dev, user: plumo, pass: plumo}
