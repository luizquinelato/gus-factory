projects:
  saas-blueprint-v1:
    label: SaaS Blueprint V1 — Projeto Base SaaS Multi-Tenant
    alias: blueprint
    template: true
    root: C:\Workspace\gus-factory\templates\projects\saas-blueprint-v1
    color: Green
    legacy: false
    conflicts_with: []
    prod:
      svc: {backend: 10000, auth: 10100, frontend: 5177, etl_frontend: 3344}
      db: {port: 5444, replica: 5445, name: saas_blueprint_v1, user: saas_blueprint_v1,
        pass: saas_blueprint_v1}
      rabbit: {user: guest, pass: guest, vhost: /}
    dev:
      svc: {backend: 10010, auth: 10110, frontend: 5178, etl_frontend: 3345}
      db: {port: 5446, replica: 5447, name: saas_blueprint_v1_dev, user: saas_blueprint_v1,
        pass: saas_blueprint_v1}
      rabbit: {user: guest, pass: guest, vhost: /}
    extra_ports:
    - {name: redis, port: 6385, proto: tcp}
    - {name: qdrant, port: 6343, proto: http}
    - {name: qdrant_grpc, port: 6344, proto: grpc}
    - {name: rabbitmq_mgmt, port: 15675, proto: http}
    - {name: rabbitmq_amqp, port: 5675, proto: amqp}
    extra_ports_dev:
